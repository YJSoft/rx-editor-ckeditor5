name: Build CKEditor 5

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ckeditor5-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[no-ci]') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Build CKEditor 5
        run: npm run build

      - name: Check build artifacts
        id: build_artifacts
        run: |
          status_file="${RUNNER_TEMP}/ckeditor5-build-status"
          git status --porcelain -- dist > "$status_file"
          if [[ -s "$status_file" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated build artifacts
        if: steps.build_artifacts.outputs.changed == 'true'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- dist
          git commit -m "[no-ci] Update CKEditor 5 build artifacts"
          git push origin "HEAD:${BRANCH_NAME}"
