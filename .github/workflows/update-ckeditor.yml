name: Update CKEditor 5

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ckeditor5-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Update CKEditor package metadata
        run: npm install --package-lock-only --save-exact --ignore-scripts --no-audit --no-fund ckeditor5@latest

      - name: Install dependencies from lockfile
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Check for updates
        id: changes
        run: |
          status_file="${RUNNER_TEMP}/ckeditor-update-status"
          git status --porcelain -- package.json package-lock.json > "$status_file"
          if [[ -s "$status_file" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          ckeditor_version="$(node -p "require('./package.json').dependencies.ckeditor5")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- package.json package-lock.json
          git commit -m "Update CKEditor 5 to ${ckeditor_version}"
          git push origin "HEAD:${BRANCH_NAME}"
